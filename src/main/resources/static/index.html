<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Baseball Conquest - AI Zone War</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="dark">

  <!-- ── 앱 루트 ── -->
  <div id="app">

    <!-- ══════════════════════════════════════════
         HEADER: 초슬림 상단 헤더
         원본: <header> in Home.tsx
    ══════════════════════════════════════════ -->
    <header class="app-header">
      <!-- 로고 -->
      <div class="logo">PLACEBALL</div>

      <!-- 중앙 점수판 -->
      <div class="scoreboard">
        <!-- KIA 점수 -->
        <div class="score-block">
          <div class="score-row">
            <span class="team-dot red">🔴</span>
            <div id="kia-score" class="score-number kia">3,171</div>
          </div>
          <div class="team-label kia">KIA</div>
        </div>

        <!-- LG 점수 -->
        <div class="score-block">
          <div class="score-row">
            <span class="team-dot blue">🔵</span>
            <div id="lg-score" class="score-number lg">2,862</div>
          </div>
          <div class="team-label lg">LG</div>
        </div>
      </div>

      <!-- 직관 다이어리 버튼 -->
      <button class="ghost-btn">📅 직관</button>
    </header>

    <!-- ══════════════════════════════════════════
         MAIN: 3단 그리드 레이아웃
         원본: <main> in Home.tsx
    ══════════════════════════════════════════ -->
    <main class="app-main">

      <!-- ── 좌측: KIA 응원 지표 ── -->
      <div class="widget widget-left">
        <div class="widget-title">🔴 KIA TIGERS</div>

        <div class="stat-block">
          <div class="stat-label">💬 수다글</div>
          <div class="stat-value">2,847</div>
          <div class="stat-unit">평균 업로드</div>
        </div>

        <div class="stat-block">
          <div class="stat-label">📸 인증샷 속도</div>
          <div class="stat-value">0.8</div>
          <div class="stat-unit">초/건</div>
        </div>

        <div class="stat-block">
          <div class="stat-label">🔥 활기도</div>
          <div class="stat-value">89</div>
          <div class="stat-unit">현재 수준</div>
        </div>
      </div>

      <!-- ── 중앙: 야구장 다이아몬드 맵 ── -->
      <div class="widget widget-center">
        <!-- Canvas: StadiumDiamondMap.tsx 변환 -->
        <canvas id="stadium-canvas" width="200" height="200"></canvas>

        <!-- 관람석별 응원 게이지 -->
        <div id="zone-gauges" class="zone-gauges"></div>
      </div>

      <!-- ── 우측: LG 전략 지표 ── -->
      <div class="widget widget-right">
        <div class="widget-title">🔵 LG TWINS</div>

        <div class="stat-block">
          <div class="stat-label">❓ 퀴즈 정답률</div>
          <div class="stat-value">92</div>
          <div class="stat-unit">%</div>
        </div>

        <div class="stat-block">
          <div class="stat-label">⚡ 역습 포인트</div>
          <div class="stat-value">+129</div>
          <div class="stat-unit">누적</div>
        </div>

        <div class="stat-block">
          <div class="stat-label">📈 효율</div>
          <div class="stat-value">78</div>
          <div class="stat-unit">%</div>
        </div>
      </div>

    </main>

    <!-- ══════════════════════════════════════════
         FOOTER: LIVE 티커
         원본: <footer> in Home.tsx
    ══════════════════════════════════════════ -->
    <footer class="app-footer">
      <div class="live-badge">LIVE</div>
      <span class="ai-icon">🤖</span>
      <div id="ticker-msg" class="ticker-msg">현재 KIA 팬들의 응원 화력이 급증 중입니다!</div>
    </footer>

    <!-- ══════════════════════════════════════════
         AI 챗봇 플로팅 버튼
         원본: Fixed div + ChatbotModal in Home.tsx
    ══════════════════════════════════════════ -->
    <div class="chatbot-float">
      <!-- 말풍선 힌트 -->
      <div id="chatbot-hint" class="chatbot-hint">전략 분석을 시작할까요?</div>
      <!-- 챗봇 버튼 -->
      <button id="chatbot-btn" class="chatbot-btn" onclick="toggleChat()">🤖</button>
    </div>

    <!-- ══════════════════════════════════════════
         챗봇 모달
         원본: ChatbotModal.tsx
    ══════════════════════════════════════════ -->
    <div id="chatbot-modal" class="chatbot-modal hidden">
      <!-- 헤더 -->
      <div class="chat-header">
        <span class="chat-title">🤖 AI 명령</span>
        <button class="chat-close-btn" onclick="toggleChat()">✕</button>
      </div>

      <!-- 메시지 영역 -->
      <div id="chat-messages" class="chat-messages">
        <!-- 초기 AI 메시지 -->
        <div class="msg-row ai">
          <div class="msg-bubble ai">
            안녕하세요! 🤖 AI 전략 사령관입니다. 현재 경기 상황을 분석하고 최적의 응원 전략을 제안해드립니다.
          </div>
        </div>
      </div>

      <!-- 입력 영역 -->
      <div class="chat-input-area">
        <input
          id="chat-input"
          type="text"
          placeholder="메시지..."
          onkeydown="if(event.key==='Enter') sendChatMessage()"
        />
        <button class="chat-send-btn" onclick="sendChatMessage()">전송</button>
      </div>
    </div>

  </div><!-- /#app -->

  <script src="/js/stadium.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
