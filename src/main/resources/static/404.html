<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PLACEBALL — 페이지를 찾을 수 없습니다</title>
    <link rel="stylesheet" href="/css/common.css" />
    <style>
        .not-found {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 16px;
            padding: 40px;
        }

        .not-found__code {
            font-size: 96px;
            font-weight: 900;
            font-family: 'Courier New', monospace;
            color: rgba(255,255,255,0.15);
            line-height: 1;
        }

        .not-found__title {
            font-size: 22px;
            font-weight: 800;
            color: var(--white);
        }

        .not-found__desc {
            font-size: 13px;
            color: rgba(255,255,255,0.45);
            max-width: 320px;
            line-height: 1.7;
        }

        .not-found__actions {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <span class="nav__logo">PLACEBALL</span>
        <div class="nav__links">
            <a href="/" class="nav__link">🏟️ 대시보드</a>
            <a href="/map" class="nav__link">🗺️ 구역 지도</a>
            <a href="/chat" class="nav__link">🤖 AI 전략</a>
        </div>
    </nav>

    <div class="not-found">
        <div class="not-found__code">404</div>
        <div class="not-found__title">페이지를 찾을 수 없습니다</div>
        <p class="not-found__desc">
            요청하신 페이지가 존재하지 않거나 이동되었습니다.<br>
            아래 버튼으로 대시보드로 돌아가세요.
        </p>
        <div class="not-found__actions">
            <a href="/" class="btn btn--primary">🏟️ 대시보드로</a>
            <a href="/chat" class="btn btn--ghost">🤖 AI 전략</a>
        </div>
    </div>
</body>
</html>
