# ============================================================
# PLACEBALL Spring Boot Application Properties
# 원본: baseballai-bicevcq9/server/index.ts PORT 설정 참조
# ============================================================

# 서버 포트 (원본 Express: process.env.PORT || 3000)
server.port=${PORT:8080}

# 애플리케이션 이름
spring.application.name=placeballspring

# ── 정적 리소스 설정 (React 빌드 결과물 서빙) ──
# 원본: app.use(express.static(staticPath))
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=3600

# ── 로깅 설정 ──
logging.level.root=INFO
logging.level.com.placeballspring=DEBUG

# ── WebSocket 설정 ──
spring.websocket.max-text-message-size=65536
spring.websocket.max-binary-message-size=65536

# ── JSON 직렬화 설정 ──
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# ── Thymeleaf (SPA 폴백용 최소 설정) ──
spring.thymeleaf.enabled=false
