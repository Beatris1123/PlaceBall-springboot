# ============================================================
# PLACEBALL Spring Boot Application Properties
# ============================================================

# 서버 포트 (원본 Express: PORT env or 3000)
server.port=${PORT:8080}

# 애플리케이션 이름
spring.application.name=placeballspring

# ── 정적 리소스 설정 ──
# React 빌드 결과물을 /static 에서 서빙
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# ── WebSocket 설정 ──
# STOMP WebSocket heartbeat (ms)
spring.websocket.stomp.heartbeat-send=10000
spring.websocket.stomp.heartbeat-receive=10000

# ── 로깅 설정 ──
logging.level.com.placeballspring=INFO
logging.level.org.springframework.web.socket=WARN
logging.level.org.springframework.messaging=WARN
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ── JSON 직렬화 설정 ──
# LocalDateTime ISO-8601 포맷
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Seoul

# ── Thymeleaf (index.html 서빙용 비활성화 - 순수 SPA) ──
spring.thymeleaf.enabled=false
