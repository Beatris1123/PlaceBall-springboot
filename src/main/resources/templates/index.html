<!DOCTYPE html>
<!--
  index.html (Thymeleaf)
  원본: client/src/pages/Home.tsx (React)
  변환: Thymeleaf + Vanilla JS + Canvas API
-->
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PLACEBALL</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

<!-- 배경 이미지 컨테이너 -->
<div id="app-root">

  <!-- ── 초슬림 상단 헤더 (원본 <header> in Home.tsx) ── -->
  <header id="main-header">
    <!-- 로고 -->
    <div id="logo">PLACEBALL</div>

    <!-- 중앙 점수판 -->
    <div id="scoreboard">
      <!-- KIA 점수 -->
      <div class="score-block">
        <div class="score-row">
          <span class="dot red">🔴</span>
          <div id="kia-score" class="score-number kia">3,171</div>
        </div>
        <div class="team-label kia">KIA</div>
      </div>

      <!-- LG 점수 -->
      <div class="score-block">
        <div class="score-row">
          <span class="dot blue">🔵</span>
          <div id="lg-score" class="score-number lg">2,862</div>
        </div>
        <div class="team-label lg">LG</div>
      </div>
    </div>

    <!-- 우측 직관 다이어리 버튼 -->
    <button id="diary-btn" class="ghost-btn">📅 직관</button>
  </header>

  <!-- ── 메인 콘텐츠 (원본 <main> 3-column grid) ── -->
  <main id="main-content">

    <!-- 좌측 위젯: KIA 응원 지표 (원본 KIA 왼쪽 패널) -->
    <div class="glass-widget" id="kia-widget">
      <div class="widget-title red-title">🔴 KIA TIGERS</div>

      <div class="stat-block">
        <div class="stat-label">💬 수다글</div>
        <div class="stat-value white">2,847</div>
        <div class="stat-sub">평균 업로드</div>
      </div>

      <div class="stat-block">
        <div class="stat-label">📸 인증샷 속도</div>
        <div class="stat-value white">0.8</div>
        <div class="stat-sub">초/건</div>
      </div>

      <div class="stat-block">
        <div class="stat-label">🔥 활기도</div>
        <div class="stat-value white">89</div>
        <div class="stat-sub">현재 수준</div>
      </div>
    </div>

    <!-- 중앙 위젯: 야구장 다이아몬드 맵 + 구역 게이지 (원본 StadiumDiamondMap) -->
    <div class="glass-widget center-widget" id="map-widget">
      <canvas id="stadium-canvas" width="200" height="200"></canvas>

      <!-- 관람석별 응원 게이지 (원본 zones.map) -->
      <div id="zone-gauges">
        <!-- JS로 동적 렌더링 -->
      </div>
    </div>

    <!-- 우측 위젯: LG 전략 지표 (원본 LG 오른쪽 패널) -->
    <div class="glass-widget" id="lg-widget">
      <div class="widget-title blue-title">🔵 LG TWINS</div>

      <div class="stat-block">
        <div class="stat-label">❓ 퀴즈 정답률</div>
        <div class="stat-value white">92</div>
        <div class="stat-sub">%</div>
      </div>

      <div class="stat-block">
        <div class="stat-label">⚡ 역습 포인트</div>
        <div class="stat-value white">+129</div>
        <div class="stat-sub">누적</div>
      </div>

      <div class="stat-block">
        <div class="stat-label">📈 효율</div>
        <div class="stat-value white">78</div>
        <div class="stat-sub">%</div>
      </div>
    </div>
  </main>

  <!-- ── 하단 AI 브리핑 LIVE 티커 (원본 <footer>) ── -->
  <footer id="live-ticker">
    <div class="live-badge">LIVE</div>
    <span class="robot-icon">🤖</span>
    <div id="ticker-text">현재 KIA 팬들의 응원 화력이 급증 중입니다!</div>
  </footer>

  <!-- ── AI 챗봇 플로팅 버튼 + 말풍선 (원본 floating div) ── -->
  <div id="chatbot-float">
    <div id="chat-hint" class="visible">전략 분석을 시작할까요?</div>
    <button id="chatbot-btn" onclick="toggleChat()">🤖</button>
  </div>

  <!-- ── AI 챗봇 모달 (원본 ChatbotModal.tsx) ── -->
  <div id="chatbot-modal" class="hidden">
    <!-- 헤더 -->
    <div id="chat-header">
      <span>🤖 AI 명령</span>
      <button id="chat-close" onclick="toggleChat()">✕</button>
    </div>

    <!-- 메시지 영역 -->
    <div id="chat-messages">
      <!-- JS로 동적 렌더링 -->
    </div>

    <!-- 입력 영역 -->
    <div id="chat-input-area">
      <input
        type="text"
        id="chat-input"
        placeholder="메시지..."
        onkeydown="if(event.key==='Enter') sendChatMessage()"
      />
      <button id="chat-send" onclick="sendChatMessage()">전송</button>
    </div>
  </div>

</div><!-- #app-root -->

<!-- SockJS + STOMP (WebSocket 실시간 업데이트) -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script th:src="@{/js/stadium-map.js}"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
